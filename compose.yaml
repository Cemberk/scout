services:
  scout-db:
    image: agnohq/pgvector:18
    container_name: scout-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - scout

  scout-api:
    container_name: scout-api
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-scout}:${IMAGE_TAG:-latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "${SCOUT_API_HOST_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./context:/app/context
    environment:
      RUNTIME_ENV: dev
      AGNO_DEBUG: "True"
      DB_HOST: scout-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      WAIT_FOR_DB: "True"
      PRINT_ENV_ON_LOAD: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Web research — Parallel (premium) or Exa MCP (keyless fallback)
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      # Slack
      SLACK_TOKEN: ${SLACK_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      # Google — Gmail + Calendar + Drive
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID:-}
      GOOGLE_DRIVE_FOLDER_IDS: ${GOOGLE_DRIVE_FOLDER_IDS:-}
      # GitHubSource — default to agno-agi/scout for out-of-the-box demo
      GITHUB_REPOS: ${GITHUB_REPOS:-agno-agi/scout}
      GITHUB_READ_TOKEN: ${GITHUB_READ_TOKEN:-}
      # S3Source (compile-only)
      S3_BUCKETS: ${S3_BUCKETS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      # Internals
      SCOUT_WORKSPACE_ID: ${SCOUT_WORKSPACE_ID:-default}
      SCOUT_CONTEXT_DIR: /app/context
    depends_on:
      - scout-db
    networks:
      - scout
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  scout:

volumes:
  pgdata:
